name: Update "Thinking About" (Every Friday)

on:
  schedule:
    # Friday 9am PST = 17:00 UTC
    - cron: '0 17 * * 5'
  # Allow manual trigger from GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  update-thinking:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get recent git commits (last 7 days)
        id: commits
        run: |
          COMMITS=$(git log --oneline --since="7 days ago" --no-merges | head -20)
          if [ -z "$COMMITS" ]; then
            COMMITS=$(git log --oneline -10 --no-merges)
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate "Thinking About" with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMITS: ${{ steps.commits.outputs.COMMITS }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          commits = os.environ.get("COMMITS", "")

          if not api_key:
              print("ANTHROPIC_API_KEY not set, skipping")
              exit(0)

          prompt = f"""Based on these recent git commits from a designer's portfolio site, write ONE short phrase (under 10 words) describing what she's currently thinking about or exploring — in the style of a personal 'now page'. Focus on themes and design thinking over technical details. Tone: thoughtful and personal.

          Commits:
          {commits}

          Reply format (two lines only, nothing else):
          [English phrase]
          [Traditional Chinese translation]"""

          payload = json.dumps({
              "model": "claude-3-5-haiku-20241022",
              "max_tokens": 100,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              }
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              text = data["content"][0]["text"].strip()
              lines = [l.strip() for l in text.split("\n") if l.strip()]
              en = lines[0] if lines else ""
              zh = lines[1] if len(lines) > 1 else en

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"THINKING_EN={en}\n")
                  f.write(f"THINKING_ZH={zh}\n")
              print(f"Generated: {en} / {zh}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"API call failed: {e} — {body}")
              exit(1)
          except Exception as e:
              print(f"API call failed: {e}")
              exit(1)
          PYEOF

      - name: Update now.json
        run: |
          TODAY=$(date +%Y-%m-%d)
          THINKING_EN="${{ steps.generate.outputs.THINKING_EN }}"
          THINKING_ZH="${{ steps.generate.outputs.THINKING_ZH }}"

          if [ -z "$THINKING_EN" ]; then
            echo "No thinking generated, skipping update"
            exit 0
          fi

          python3 - <<PYEOF
          import json

          with open('src/data/now.json', 'r') as f:
              data = json.load(f)

          data['thinking'] = "$THINKING_EN"
          data['thinking_zh'] = "$THINKING_ZH"
          data['updated'] = "$TODAY"

          with open('src/data/now.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/now.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update: thinking about (weekly auto-update)"
            git push
          fi
